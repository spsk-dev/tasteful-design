<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Flow Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #1a1a1a;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 48px 32px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 1.125rem;
      color: #555;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .cta {
      display: inline-block;
      padding: 14px 36px;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .cta:hover { background: #333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome</h1>
    <p>This is the start of a simple 3-screen flow for testing the design-audit command.</p>
    <a href="page2.html" class="cta">Get Started</a>
  </div>
</body>
</html>
